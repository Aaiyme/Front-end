<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Sign up</title>
  </head>
  <body>
    <header><h1>Simple Sign up</h1></header>
    <section>
      <form>
        <label for="username"> Username </label>
        <input 
            type="text" 
            id="username" 
            name="username" 
        /><br /><br />
        <label for="password">Password </label>
        <input 
            type="password" 
            id="password" 
            name="password" 
        /><br /><br />
        <label for="re-password">Re-enter password</label>
        <input
          type="password"
          id="re-password"
          name="re-password"
        /><br /><br />
        <label for="email">Email: </label>
        <input 
            type="email" 
            id="email" 
            name="email" 
        /><br /><br />
        <button type="submit">Signup</button>
      </form>
    </section>
  </body>
</html>
